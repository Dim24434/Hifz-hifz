// ═══ OFFLINE QURAN CACHE (localStorage) ═══
const QC={
  K:'qc2',TK:'qt2',
  _a:()=>{try{return JSON.parse(localStorage.getItem(QC.K)||'{}')}catch{return{}}},
  _t:()=>{try{return JSON.parse(localStorage.getItem(QC.TK)||'{}')}catch{return{}}},
  get:n=>QC._a()[n]||null,
  has:n=>!!QC.get(n),
  count:()=>Object.keys(QC._a()).length,
  set:(n,d)=>{try{const a=QC._a();a[n]=d;localStorage.setItem(QC.K,JSON.stringify(a));}catch{}},
  getTf:n=>QC._t()[n]||null,
  setTf:(n,d)=>{try{const a=QC._t();a[n]=d;localStorage.setItem(QC.TK,JSON.stringify(a));}catch{}},
  async fetch(n){
    const cached=QC.get(n);if(cached)return cached;
    const r=await fetch(`https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,en.sahih`);
    const d=await r.json();if(!d.data)throw new Error('API');
    const ay=d.data[0].ayahs.map((a,i)=>({i:a.numberInSurah,ar:a.text,tr:d.data[1].ayahs[i]?.text||''}));
    QC.set(n,ay);return ay;
  },
  async fetchTf(n){
    const cached=QC.getTf(n);if(cached)return cached;
    const r=await fetch(`https://api.alquran.cloud/v1/surah/${n}/en.muyassar`);
    const d=await r.json();if(!d.data)throw new Error();
    const tf=d.data.ayahs.map(a=>a.text);QC.setTf(n,tf);return tf;
  },
  async fetchPage(p){
    const k=`p${p}`;const cached=QC.get(k);if(cached)return cached;
    const r=await fetch(`https://api.alquran.cloud/v1/page/${p}/quran-uthmani`);
    const d=await r.json();if(!d.data)throw new Error();
    const data={ayahs:d.data.ayahs.map(a=>({i:a.numberInSurah,ar:a.text,sn:a.surah.number,sAr:a.surah.name,sEn:a.surah.englishName,juz:a.juz}))};
    QC.set(k,data);return data;
  },
  async downloadAll(onProg){
    for(let n=1;n<=114;n++){
      if(!QC.has(n)){try{await QC.fetch(n);}catch{}}
      onProg(n);
      await new Promise(r=>setTimeout(r,80));
    }
  }
};

    {ar:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",tr:"Asbahnā wa asbahal mulku lillāh, walhamdu lillāh, lā ilāha illallāhu wahdahu lā sharīka lah, lahul mulku wa lahul hamdu wa huwa ʿalā kulli shay'in qadīr",en:"We have entered a new morning and with it all dominion belongs to Allah. All praise is for Allah. None has the right to be worshipped except Allah, alone, without partner, to Him belongs all sovereignty and praise, and He is over all things omnipotent.",count:1,source:"Muslim"},
    {ar:"اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا وَبِكَ نَحْيَا وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُورُ",tr:"Allāhumma bika asbahnā wa bika amsaynā wa bika nahyā wa bika namūtu wa ilaykan-nushūr",en:"O Allah, by You we enter the morning and by You we enter the evening, by You we live and by You we die, and to You is the final resurrection.",count:1,source:"Tirmidhi"},
    {ar:"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ لَكَ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",tr:"Allāhumma anta rabbī lā ilāha illā ant, khalaqtanī wa anā ʿabduk, wa anā ʿalā ʿahdika wa waʿdika mā-staṭaʿt, aʿūdhu bika min sharri mā ṣanaʿt, abū'u laka biniʿmatika ʿalayya wa abū'u laka bidhambī faghfir lī fa-inahu lā yaghfiru-dhdhunūba illā ant",en:"Sayyid al-Istighfar: O Allah You are my Lord. None has the right to be worshipped except You. You created me and I am Your slave. I keep my covenant and promise to You as best I can. I seek refuge with You from the evil of what I have done. I acknowledge Your favor upon me and I acknowledge my sin, so forgive me for none forgives sins except You.",count:1,source:"Bukhari",note:"The Master of Seeking Forgiveness"},
    {ar:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",tr:"SubhānAllāhi wa bihamdih",en:"Glory and praise be to Allah.",count:100,source:"Muslim",note:"Whoever says this 100x in the morning — sins forgiven even if like sea foam"},
    {ar:"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ",tr:"Bismillāhi-lladhī lā yaḍurru maʿa-smihi shay'un fil-arḍi wa lā fi-s-samā'i wa huwa-s-samīʿu-l-ʿalīm",en:"In the name of Allah with Whose name nothing can cause harm on earth or in heaven, and He is the All-Hearing, All-Knowing.",count:3,source:"Abu Dawud, Tirmidhi",note:"Nothing will harm one who says this 3x in morning"},
    {ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ",tr:"Allāhumma innī as'alukal-ʿafwa wal-ʿāfiyata fid-dunyā wal-ākhirah",en:"O Allah, I ask You for pardon and well-being in this life and the next.",count:1,source:"Ibn Majah"},
  ],
  evening:[
    {ar:"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",tr:"Amsaynā wa amsal mulku lillāh, walhamdu lillāh, lā ilāha illallāhu wahdahu lā sharīka lah, lahul mulku wa lahul hamdu wa huwa ʿalā kulli shay'in qadīr",en:"We have reached the evening and with it all dominion belongs to Allah...",count:1,source:"Muslim"},
    {ar:"اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ أَصْبَحْنَا وَبِكَ نَحْيَا وَبِكَ نَمُوتُ وَإِلَيْكَ الْمَصِيرُ",tr:"Allāhumma bika amsaynā wa bika asbahnā wa bika nahyā wa bika namūtu wa ilayk-almaṣīr",en:"O Allah, by You we enter the evening and by You we enter the morning, by You we live and by You we die, and to You is the final return.",count:1,source:"Tirmidhi"},
    {ar:"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ",tr:"Allāhumma ʿāfinī fī badanī, Allāhumma ʿāfinī fī samʿī, Allāhumma ʿāfinī fī baṣarī, lā ilāha illā ant",en:"O Allah, grant my body health. O Allah, grant my hearing health. O Allah, grant my sight health. None has the right to be worshipped except You.",count:3,source:"Abu Dawud"},
    {ar:"حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ",tr:"Hasbiyallāhu lā ilāha illā huwa ʿalayhi tawakkaltu wa huwa rabbu-l-ʿarshi-l-ʿaẓīm",en:"Allah is sufficient for me. None has the right to be worshipped except Him. I have placed my trust in Him, and He is the Lord of the Magnificent Throne.",count:7,source:"Abu Dawud"},
    {ar:"أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",tr:"Aʿūdhu bikalimāti-llāhi-ttāmmāti min sharri mā khalaq",en:"I seek refuge in the perfect words of Allah from the evil of what He has created.",count:3,source:"Muslim",note:"Say in the evening — nothing will harm you that night"},
  ],
  sleep:[
    {ar:"بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا",tr:"Bismika Allāhumma amūtu wa aḥyā",en:"In Your name, O Allah, I die and I live.",count:1,source:"Bukhari"},
    {ar:"اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ",tr:"Allāhumma qinī ʿadhābaka yawma tabʿathu ʿibādak",en:"O Allah, protect me from Your punishment on the Day You resurrect Your slaves.",count:3,source:"Abu Dawud"},
    {ar:"سُبْحَانَ اللَّهِ ٣٣ — الْحَمْدُ لِلَّهِ ٣٣ — اللَّهُ أَكْبَرُ ٣٤",tr:"SubhānAllāh ×33, Alhamdulillāh ×33, Allāhu Akbar ×34",en:"The Tasbihat of Fatimah (RA). The Prophet ﷺ said it is better than a servant for you. (Bukhari & Muslim)",count:100,source:"Bukhari & Muslim",note:"Say this before sleeping every night"},
    {ar:"آيَةُ الْكُرْسِيِّ — الإخلاص — الفلق — الناس",tr:"Recite: Ayat al-Kursi (2:255), then Surahs Al-Ikhlas, Al-Falaq, and An-Nas",en:"Blow into your cupped hands after each and wipe over your body from your head, starting 3 times.",count:3,source:"Bukhari"},
    {ar:"اللَّهُمَّ أَسْلَمْتُ نَفْسِي إِلَيْكَ وَفَوَّضْتُ أَمْرِي إِلَيْكَ وَأَلْجَأْتُ ظَهْرِي إِلَيْكَ رَغْبَةً وَرَهْبَةً إِلَيْكَ لَا مَلْجَأَ وَلَا مَنْجَا مِنْكَ إِلَّا إِلَيْكَ آمَنْتُ بِكِتَابِكَ الَّذِي أَنْزَلْتَ وَبِنَبِيِّكَ الَّذِي أَرْسَلْتَ",tr:"Allāhumma aslamtu nafsī ilayk, wa fawwaḍtu amrī ilayk, wa alja'tu ẓahrī ilayk, raghbatan wa rahbatan ilayk, lā malja'a wa lā manjā minka illā ilayk, āmantu bikitābika-lladhī anzalt, wa binabiyyika-lladhī arsalt",en:"O Allah, I submit myself to You, entrust my affairs to You, seek Your support with hope and fear of You. There is no refuge or escape from You except to You. I believe in Your Book which You have revealed and Your Prophet whom You have sent.",count:1,source:"Bukhari & Muslim",note:"Whoever says this and dies in the night dies upon the Fitrah"},
  ],
  waking:[
    {ar:"الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ",tr:"Alhamdu lillāhi-lladhī aḥyānā baʿda mā amātanā wa ilayhi-nnushūr",en:"All praise is for Allah who gave us life after having taken it from us, and unto Him is the resurrection.",count:1,source:"Bukhari"},
    {ar:"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ وَلَا إِلَهَ إِلَّا اللَّهُ وَاللَّهُ أَكْبَرُ وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ",tr:"Lā ilāha illallāhu waḥdahu lā sharīka lah, lahul mulku wa lahul ḥamdu wa huwa ʿalā kulli shay'in qadīr, SubhānAllāhi walḥamdu lillāhi wa lā ilāha illAllāhu wallāhu Akbar, wa lā ḥawla wa lā quwwata illā billāh",en:"None has the right to be worshipped except Allah alone... (continues). Whoever says this upon waking shall be forgiven, and if they supplicate it shall be answered.",count:1,source:"Bukhari",note:"Whoever says this upon waking and makes du'a, it will be answered"},
    {ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الْيَوْمِ فَتْحَهُ وَنَصْرَهُ وَنُورَهُ وَبَرَكَتَهُ وَهُدَاهُ",tr:"Allāhumma innī as'aluka khayra hādha-l-yawmi fatḥahu wa naṣrahu wa nūrahu wa barakatahu wa hudāh",en:"O Allah, I ask You for the good of this day — its opening, its victory, its light, its blessings, and its guidance.",count:1,source:"Abu Dawud"},
  ],
  salah:[
    {ar:"أَسْتَغْفِرُ اللَّهَ",tr:"Astaghfirullāh",en:"I seek forgiveness from Allah.",count:3,source:"Muslim"},
    {ar:"اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ، تَبَارَكْتَ ذَا الْجَلَالِ وَالْإِكْرَامِ",tr:"Allāhumma anta-s-salāmu wa minka-s-salāmu, tabārakta dhā-l-jalāli wal-ikrām",en:"O Allah, You are Peace and from You comes peace. Blessed are You, Owner of majesty and honour.",count:1,source:"Muslim"},
    {ar:"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",tr:"Lā ilāha illallāhu waḥdahu lā sharīka lah, lahul mulku wa lahul ḥamdu wa huwa ʿalā kulli shay'in qadīr",en:"None has the right to be worshipped except Allah, alone, without partner. His is the dominion, His is the praise, and He has power over all things.",count:1,source:"Muslim"},
    {ar:"سُبْحَانَ اللَّهِ ×٣٣ — الْحَمْدُ لِلَّهِ ×٣٣ — اللَّهُ أَكْبَرُ ×٣٣",tr:"SubhānAllāh ×33, Alhamdulillāh ×33, Allāhu Akbar ×33, then complete with: Lā ilāha illallāhu wahdahu lā sharīka lah...",en:"Sins shall be forgiven even if they are as great as the foam of the sea. (Muslim)",count:99,source:"Muslim",note:"Post-salah tasbih — most rewarding consistent dhikr"},
    {ar:"آيَةُ الْكُرْسِيِّ (البقرة ٢٥٥)",tr:"Āyat al-Kursī — Recite the full verse (2:255)",en:"Whoever recites Ayat al-Kursi after every obligatory prayer, nothing stands between them and entering Paradise except death. (An-Nasa'i, authenticated by Al-Albani)",count:1,source:"An-Nasa'i"},
    {ar:"قُلْ هُوَ اللَّهُ أَحَدٌ — قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ — قُلْ أَعُوذُ بِرَبِّ النَّاسِ",tr:"Surah Al-Ikhlas, Al-Falaq, and An-Nas",en:"Recite each surah 3 times after Fajr and Maghrib — that will be sufficient for you against everything. (Abu Dawud, Tirmidhi)",count:3,source:"Tirmidhi"},
  ],
  eating:[
    {ar:"بِسْمِ اللَّهِ",tr:"Bismillāh",en:"In the name of Allah. Say before eating.",count:1,source:"Bukhari & Muslim"},
    {ar:"بِسْمِ اللَّهِ أَوَّلَهُ وَآخِرَهُ",tr:"Bismillāhi awwalahu wa ākhirah",en:"In the name of Allah at its beginning and at its end. (If you forgot to say Bismillah at the start, say this.)",count:1,source:"Abu Dawud, Tirmidhi"},
    {ar:"الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنَا وَسَقَانَا وَجَعَلَنَا مِنَ الْمُسْلِمِينَ",tr:"Alhamdu lillāhi-lladhī aṭʿamanā wa saqānā wa jaʿalanā minal-muslimīn",en:"All praise is for Allah Who has fed us, given us drink, and made us Muslims.",count:1,source:"Abu Dawud, Tirmidhi",note:"After eating"},
    {ar:"اللَّهُمَّ أَطْعِمْ مَنْ أَطْعَمَنِي وَاسْقِ مَنْ سَقَانِي",tr:"Allāhumma aṭʿim man aṭʿamanī wasqi man saqānī",en:"O Allah, feed the one who has fed me and give drink to the one who has given me drink.",count:1,source:"Muslim"},
    {ar:"اللَّهُمَّ بَارِكْ لَنَا فِيهِ وَأَطْعِمْنَا خَيْرًا مِنْهُ",tr:"Allāhumma bārik lanā fīhi wa aṭʿimanā khayran minh",en:"O Allah, bless us in it and feed us with better than it.",count:1,source:"Tirmidhi",note:"Upon drinking milk"},
  ],
  home:[
    {ar:"بِسْمِ اللَّهِ وَلَجْنَا وَبِسْمِ اللَّهِ خَرَجْنَا وَعَلَى اللَّهِ رَبِّنَا تَوَكَّلْنَا",tr:"Bismillāhi walajnā, wa bismillāhi kharajnā, wa ʿalAllāhi rabbinā tawakkalnā",en:"In the name of Allah we enter, in the name of Allah we leave, and upon Allah our Lord we place our trust.",count:1,source:"Abu Dawud",note:"Entering the home"},
    {ar:"بِسْمِ اللَّهِ تَوَكَّلْتُ عَلَى اللَّهِ وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ",tr:"Bismillāh, tawakkaltu ʿalAllāh, wa lā ḥawla wa lā quwwata illā billāh",en:"In the name of Allah, I place my trust in Allah, and there is no power or might except with Allah.",count:1,source:"Abu Dawud, Tirmidhi",note:"Leaving the home — it is said one will be guided, protected and guarded"},
    {ar:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبُثِ وَالْخَبَائِثِ",tr:"Allāhumma innī aʿūdhu bika minal-khubuthi wal-khabā'ith",en:"O Allah, I seek refuge with You from all evil and evil-doers.",count:1,source:"Bukhari & Muslim",note:"Entering the toilet — say before entering"},
    {ar:"غُفْرَانَكَ",tr:"Ghufrānaka",en:"I seek Your forgiveness. (Upon leaving the toilet)",count:1,source:"Abu Dawud, Tirmidhi",note:"Exiting the toilet"},
    {ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الطَّرِيقِ وَخَيْرَ مَا فِيهِ وَأَعُوذُ بِكَ مِنْ شَرِّهِ وَشَرِّ مَا فِيهِ",tr:"Allāhumma innī as'aluka khayra hādha-ṭ-ṭarīqi wa khayra mā fīhi wa aʿūdhu bika min sharrih wa sharri mā fīh",en:"O Allah, I ask You for the good of this road and the good it contains, and I seek refuge in You from its evil and the evil it contains.",count:1,source:"Muslim",note:"During travel"},
  ],
  protection:[
    {ar:"أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",tr:"Aʿūdhu bikalimāti-llāhi-ttāmmāti min sharri mā khalaq",en:"I seek refuge in the perfect words of Allah from the evil of what He has created.",count:3,source:"Muslim"},
    {ar:"لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ",tr:"Lā ilāha illā anta subhānaka innī kuntu mina-ẓẓālimīn",en:"Dua of Yunus ﷺ from the belly of the whale. None has the right to be worshipped except You, glory be to You. Indeed I have been of the wrongdoers.",count:1,source:"Tirmidhi",note:"Dua Yunus — Allah says He will answer this"},
    {ar:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ وَالْعَجْزِ وَالْكَسَلِ وَالْبُخْلِ وَالْجُبْنِ وَضَلَعِ الدَّيْنِ وَغَلَبَةِ الرِّجَالِ",tr:"Allāhumma innī aʿūdhu bika minal-hammi wal-ḥazani wal-ʿajzi wal-kasali wal-bukhli wal-jubni wa ḍalaʿid-dayni wa ghalabatir-rijāl",en:"O Allah, I seek refuge in You from anxiety and grief, from incapacity and laziness, from miserliness and cowardice, from the burden of debt and from being overpowered by men.",count:1,source:"Bukhari"},
    {ar:"حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ",tr:"Hasbunallāhu wa niʿmal-wakīl",en:"Allah is sufficient for us, and how excellent a Trustee. (What Ibrahim AS said when thrown into the fire; what the Prophet ﷺ and companions said at Uhud.)",count:1,source:"Bukhari"},
    {ar:"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ",tr:"Bismillāhi-lladhī lā yaḍurru maʿa-smihi shay'un fil-arḍi wa lā fi-s-samā'i wa huwa-s-samīʿu-l-ʿalīm",en:"In the name of Allah with Whose name nothing can cause harm on earth or in heaven. He is the All-Hearing, All-Knowing.",count:3,source:"Abu Dawud, Tirmidhi"},

function App(){

  const ta=o=>`rgba(78,205,196,${o})`;

  const[chatIn,setChatIn]=useState("");

  const[apiKey,setApiKey]=useState(()=>DB.g("ak",""));
  const[apiKeyIn,setApiKeyIn]=useState(()=>DB.g("ak",""));
  const[showKey,setShowKey]=useState(false);
  const[recSrch,setRecSrch]=useState("");

  // User progress
  const[memMap,setMemMap]=useState(()=>DB.g("mem",{}));

  const[streak,setStreak]=useState(()=>DB.g("str",0));
  const[lastDay,setLastDay]=useState(()=>DB.g("ld",null));
  const[lw,setLw]=useState(()=>DB.g("lw",[]));

  // ── NEW: Tools & Islamic features ──
  const[toolTab,setToolTab]=useState("hub");
  const[prayerTimes,setPrayerTimes]=useState(()=>DB.g("pt",null));
  const[prayerLoc,setPrayerLoc]=useState(()=>({lat:DB.g("pLat",null),lng:DB.g("pLng",null)}));
  const[prayerMethod,setPrayerMethod]=useState(()=>DB.g("pMethod",2));
  const[prayerLoad,setPrayerLoad]=useState(false);
  const[prayerErr,setPrayerErr]=useState(null);
  const[qiblaDir,setQiblaDir]=useState(()=>DB.g("qibla",null));
  const[deviceHeading,setDeviceHeading]=useState(null);
  const[compassPerm,setCompassPerm]=useState("unknown");

  // Audio refs
  const audioEl=useRef(null);

  useEffect(()=>{surahRef.current=selSurah;},[selSurah]);
  useEffect(()=>{recRef.current=reciter;},[reciter]);

  // Audio engine setup
  useEffect(()=>{
    const a=new Audio();audioEl.current=a;
    a.addEventListener("playing",()=>{setIsPlaying(true);});
    a.addEventListener("ended",()=>{
      if(!isPlayRef.current)return;
      if(loopRef.current){a.play().catch(()=>{});return;}
      const next=hlRef.current+1;
      const ays=ayahsRef.current;const su=surahRef.current;
      if(ays.length&&su&&next<ays.length){
        hlRef.current=next;setHlIdx(next);
        a.src=ayahUrl(recRef.current.folder,su.n,ays[next].i);
        a.load();a.play().catch(()=>{});
      }else{isPlayRef.current=false;setIsPlaying(false);}
    });
    a.addEventListener("error",()=>{
      const next=hlRef.current+1;const ays=ayahsRef.current;const su=surahRef.current;
      if(isPlayRef.current&&ays.length&&su&&next<ays.length){
        hlRef.current=next;setHlIdx(next);
        a.src=ayahUrl(recRef.current.folder,su.n,ays[next].i);
        a.load();a.play().catch(()=>{});
      }else{isPlayRef.current=false;setIsPlaying(false);}
    });
    return()=>a.pause();
  },[]);

  // Scroll highlighted verse into view
  useEffect(()=>{
    if(screen==="study"&&ayahs.length){
      setTimeout(()=>{document.getElementById(`v${hlIdx}`)?.scrollIntoView({behavior:"smooth",block:"center"});},80);
    }
  },[hlIdx,screen]);

  // Chat end scroll
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[chatMsgs]);

  // Streak
  useEffect(()=>{
    const today=new Date().toDateString();
    if(lastDay!==today){
      const yest=new Date(Date.now()-864e5).toDateString();
      const ns=lastDay===yest?streak+1:1;
      setStreak(ns);setLastDay(today);DB.s("str",ns);DB.s("ld",today);
    }
  },[]);

  // Load surah
  useEffect(()=>{
    if(!selSurah||screen!=="study")return;
    setLoadingQ(true);setErrQ(false);setAyahs([]);setTafseer([]);
    setHlIdx(0);hlRef.current=0;
    audioEl.current?.pause();isPlayRef.current=false;setIsPlaying(false);
    QC.fetch(selSurah.n).then(ay=>{setAyahs(ay);setLoadingQ(false);}).catch(()=>{setErrQ(true);setLoadingQ(false);});
  },[selSurah,screen]);

  // Load tafseer when showTf toggled
  useEffect(()=>{
    if(!selSurah||!showTf||tafseer.length)return;
    setLoadingTf(true);
    QC.fetchTf(selSurah.n).then(tf=>{setTafseer(tf);setLoadingTf(false);}).catch(()=>setLoadingTf(false));
  },[showTf,selSurah]);

  // Load mushaf page
  useEffect(()=>{
    if(screen!=="mushaf")return;
    setMLoad(true);setMData(null);setMErr(false);
    QC.fetchPage(mPage).then(d=>{setMData(d);setMLoad(false);}).catch(()=>{setMErr(true);setMLoad(false);});
  },[mPage,screen]);

  // Helpers
  // ── Prayer times fetch ──
  const fetchPrayer=async(lat,lng,method)=>{
    setPrayerLoad(true);setPrayerErr(null);
    try{
      const r=await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=${method}`);
      const d=await r.json();
      if(d.code===200){
        const t=d.data.timings;
        const pt={Fajr:t.Fajr,Sunrise:t.Sunrise,Dhuhr:t.Dhuhr,Asr:t.Asr,Maghrib:t.Maghrib,Isha:t.Isha,date:d.data.date.readable,lat,lng,method};
        setPrayerTimes(pt);DB.s("pt",pt);DB.s("pLat",lat);DB.s("pLng",lng);DB.s("pMethod",method);
      }else setPrayerErr("Could not get prayer times.");
    }catch{setPrayerErr("Network error. Please check your connection.");}
    setPrayerLoad(false);
  };
  const getPrayerLocation=()=>{
    if(!navigator.geolocation){setPrayerErr("Geolocation not supported.");return;}
    setPrayerLoad(true);
    navigator.geolocation.getCurrentPosition(
      pos=>{const{latitude:lat,longitude:lng}=pos.coords;setPrayerLoc({lat,lng});fetchPrayer(lat,lng,prayerMethod);},
      ()=>{setPrayerLoad(false);setPrayerErr("Location denied. Please enable location access in your browser settings.");}
    );
  };
  const fetchQibla=()=>{
    if(!navigator.geolocation)return;
    setPrayerLoad(true);
    navigator.geolocation.getCurrentPosition(async pos=>{
      try{
        const{latitude:lat,longitude:lng}=pos.coords;
        const r=await fetch(`https://api.aladhan.com/v1/qibla/${lat}/${lng}`);
        const d=await r.json();
        if(d.code===200){setQiblaDir(d.data.direction);DB.s("qibla",d.data.direction);}
      }catch{}
      setPrayerLoad(false);
    },()=>setPrayerLoad(false));
  };
  const orientHandler=useCallback(e=>{
    let h=null;
    if(e.webkitCompassHeading!=null)h=e.webkitCompassHeading;
    else if(e.absolute&&e.alpha!=null)h=(360-e.alpha)%360;
    else if(e.alpha!=null)h=(360-e.alpha)%360;
    if(h!=null)setDeviceHeading(h);
  },[]);
  const requestCompass=async()=>{
    if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
      try{
        const p=await DeviceOrientationEvent.requestPermission();
        if(p==="granted"){setCompassPerm("granted");window.addEventListener("deviceorientationabsolute",orientHandler,true);window.addEventListener("deviceorientation",orientHandler,true);}
        else setCompassPerm("denied");
      }catch{setCompassPerm("denied");}
    }else{
      setCompassPerm("granted");
      window.addEventListener("deviceorientationabsolute",orientHandler,true);
      window.addEventListener("deviceorientation",orientHandler,true);
    }
  };
  // Tasbeeh voice
  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Speech recognition not supported in this browser. Try Chrome.");return;}
    const r=new SR();r.continuous=true;r.interimResults=false;
    r.lang="ar-SA";
    const triggers={
      SubhanAllah:["سبحان","subhan","sophan"],
      Alhamdulillah:["الحمد","alhamdu","hamdulillah"],
      "Allahu Akbar":["اكبر","akbar","allah akbar"],
      Astaghfirullah:["استغفر","astaghfir","staghfir"],
      "La ilaha illallah":["لا اله","la ilaha","اله الا"],
      Salawat:["صل","صلى","salla","salat"],
    };
    r.onresult=e=>{
      const txt=Array.from(e.results).map(r=>r[0].transcript).join(" ").toLowerCase();
      const t=triggers[tasbeehMode]||[];
      if(t.some(k=>txt.includes(k))){if(navigator.vibrate)navigator.vibrate(40);setTasbeehCount(c=>c+1);}

    r.onend=()=>{if(recogRef.current===r&&voiceOn)try{r.start();}catch{}};

  const stopAll=()=>{audioEl.current?.pause();isPlayRef.current=false;setIsPlaying(false);};

  // Recording (base64 approach for iOS)
  const startRec=async()=>{
    setRecErr2(null);setRecUrl(null);setRecBlob(null);setRecPl(false);
    if(!navigator.mediaDevices?.getUserMedia){setRecErr2("browser");return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mime=getMime();const mr=new MediaRecorder(stream,mime?{mimeType:mime}:{});
      chks.current=[];
      mr.ondataavailable=e=>{if(e.data?.size>0)chks.current.push(e.data);};
      mr.onstop=()=>{
        const blob=new Blob(chks.current,{type:mr.mimeType||"audio/webm"});setRecBlob(blob);
        const r=new FileReader();r.onloadend=()=>setRecUrl(r.result);r.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mr.start(200);mrRef.current=mr;setIsRec(true);
    }catch(e){setRecErr2(e.name==="NotAllowedError"?"denied":"browser");}
  };
  const stopRec=()=>{try{if(mrRef.current?.state!=="inactive")mrRef.current.stop();}catch{}setIsRec(false);};
  const playRec=()=>{
    if(!recUrl)return;
    if(rAud.current){try{rAud.current.pause();}catch{}}

  // ════════════ PRAYER TIMES ════════════
  const PrayerTool=()=>{
    const NAMES=["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
    const [now,setNow]=React.useState(new Date());
    React.useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
    const toMin=s=>{const[h,m]=s.split(":").map(Number);return h*60+m;};
    const nowMin=now.getHours()*60+now.getMinutes();
    const nextPrayer=prayerTimes?NAMES.filter(n=>n!=="Sunrise").reduce((acc,n)=>{
      const pm=toMin(prayerTimes[n]);
      const diff=pm>nowMin?pm-nowMin:pm+1440-nowMin;
      return(!acc||diff<acc.diff)?{name:n,diff,time:prayerTimes[n]}:acc;
    },null):null;
    const fmtCountdown=m=>{const h=Math.floor(m/60),mn=m%60;return h>0?`${h}h ${mn}m`:mn+"m";};
    return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0 10px"}}>
          <div style={{fontSize:11,color:G,letterSpacing:"0.2em",textTransform:"uppercase"}}>Prayer Times · أوقات الصلاة</div>
          <button onClick={()=>setToolTab("hub")} style={{background:"none",border:"none",color:ga(0.5),cursor:"pointer",fontSize:20}}>←</button>
        </div>
        {/* Method picker */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:10}}>
          {PRAYER_METHODS.map(m=>(
            <button key={m.id} onClick={()=>{setPrayerMethod(m.id);if(prayerLoc.lat)fetchPrayer(prayerLoc.lat,prayerLoc.lng,m.id);}}
              style={{...pill(prayerMethod===m.id),whiteSpace:"nowrap",flexShrink:0}}>{m.name}</button>
          ))}
        </div>
        {/* Location button */}
        {!prayerTimes&&<button onClick={getPrayerLocation} style={{...gBtn,width:"100%",justifyContent:"center",marginBottom:12}} disabled={prayerLoad}>
          {prayerLoad?<><Sp/> Getting location…</>:<><Ic n="location" z={16}/> Get My Prayer Times</>}
        </button>}
        {prayerErr&&<div style={{...card,background:"rgba(220,60,60,0.08)",border:"1px solid rgba(220,60,60,0.3)",color:"#ff7070",fontSize:12,marginBottom:10}}>{prayerErr}</div>}
        {/* Next prayer countdown */}
        {nextPrayer&&<div style={{...card,background:`linear-gradient(135deg,${ga(0.12)},${ga(0.06)})`,border:`1px solid ${ga(0.3)}`,textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:10,color:ga(0.5),textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:4}}>Next Prayer</div>
          <div style={{fontSize:24,fontWeight:700,color:G,fontFamily:"'Cinzel',serif"}}>{nextPrayer.name}</div>
          <div style={{fontSize:14,color:TX,marginTop:2}}>{nextPrayer.time}</div>
          <div style={{fontSize:12,color:T,marginTop:5}}>⏱ {fmtCountdown(nextPrayer.diff)} remaining</div>
        </div>}
        {/* Prayer times list */}
        {prayerTimes&&<>
          <div style={{fontSize:10,color:ga(0.45),marginBottom:8}}>{prayerTimes.date} · {prayerLoc.lat?.toFixed(3)}°N {prayerLoc.lng?.toFixed(3)}°E</div>
          {NAMES.map(n=>{
            const isNext=nextPrayer?.name===n;
            const isPast=prayerTimes[n]&&toMin(prayerTimes[n])<nowMin&&n!=="Sunrise";
            return(
              <div key={n} style={{...card,display:"flex",justifyContent:"space-between",alignItems:"center",
                border:`1px solid ${isNext?ga(0.45):ga(0.13)}`,background:isNext?ga(0.12):ga(0.05),marginBottom:7,padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:16}}>{n==="Fajr"?"🌅":n==="Sunrise"?"☀️":n==="Dhuhr"?"🌤":n==="Asr"?"🌇":n==="Maghrib"?"🌆":"🌙"}</span>
                  <div><div style={{fontSize:14,color:isNext?GL:TX,fontWeight:isNext?700:400}}>{n}</div>
                    <div style={{fontSize:10,color:ga(0.4)}}>{n==="Fajr"?"فجر":n==="Sunrise"?"شروق":n==="Dhuhr"?"ظهر":n==="Asr"?"عصر":n==="Maghrib"?"مغرب":"عشاء"}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:15,color:isNext?G:isPast?ga(0.4):TX,fontFamily:"'Cinzel',serif"}}>{prayerTimes[n]}</div>
                  {isNext&&<div style={{fontSize:9,color:T}}>NEXT</div>}
                </div>
              </div>
            );
          })}
          <button onClick={getPrayerLocation} style={{...ghost(false),fontSize:11,marginTop:6}} disabled={prayerLoad}>
            {prayerLoad?<><Sp/> Updating…</>:<><Ic n="location" z={13}/> Refresh</>}
          </button>
        </>}
      </div>
    );
  };

            </div>
          </div>

          {compassPerm!=="granted"&&<button onClick={requestCompass} style={{...ghost(false),width:"100%",justifyContent:"center",fontSize:12,marginBottom:10}}>

          {compassPerm==="denied"&&<div style={{...card,color:ga(0.6),fontSize:12}}>Compass permission denied. Enable it in your browser/device settings for a live arrow.</div>}
          <div style={{...card,background:ga(0.04),fontSize:12,color:ga(0.6),lineHeight:1.7}}>
            The arrow points toward the Kaaba in Makkah Al-Mukarramah. Hold your device flat and rotate until the arrow points forward.
          </div>
          <button onClick={()=>{fetchQibla();requestCompass();}} style={{...ghost(false),fontSize:11,marginTop:8}} disabled={prayerLoad}>
            <Ic n="location" z={13}/> Recalibrate
          </button>
        </>}
      </div>
    );
  };

  // ════════════ TASBEEH ════════════
  const TasbeehTool=()=>{
    const MODES=["SubhanAllah","Alhamdulillah","Allahu Akbar","Astaghfirullah","La ilaha illallah","Salawat"];
    const AR={"SubhanAllah":"سُبْحَانَ اللَّه","Alhamdulillah":"الْحَمْدُ لِلَّه","Allahu Akbar":"اللَّهُ أَكْبَرُ","Astaghfirullah":"أَسْتَغْفِرُ اللَّه","La ilaha illallah":"لَا إِلَٰهَ إِلَّا اللَّه","Salawat":"اللَّهُمَّ صَلِّ عَلَى مُحَمَّد"};
    const pct=Math.min(100,Math.round(tasbeehCount/tasbeehTarget*100));
    const done=tasbeehCount>=tasbeehTarget;
    const tap=()=>{if(navigator.vibrate)navigator.vibrate(40);setTasbeehCount(c=>c+1);};
    return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0 10px"}}>
          <div style={{fontSize:11,color:G,letterSpacing:"0.2em",textTransform:"uppercase"}}>Tasbeeh · التسبيح</div>
          <button onClick={()=>setToolTab("hub")} style={{background:"none",border:"none",color:ga(0.5),cursor:"pointer",fontSize:20}}>←</button>
        </div>
        {/* Mode pills */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,marginBottom:12}}>
          {MODES.map(m=>(
            <button key={m} onClick={()=>{setTasbeehMode(m);setTasbeehCount(0);if(voiceOn){stopVoice();startVoice();}}}
              style={{...pill(tasbeehMode===m),flexShrink:0,whiteSpace:"nowrap"}}>{m}</button>
          ))}
        </div>
        {/* Counter circle */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:16}}>
          <div className="tasbeeh-tap" onClick={tap} style={{width:200,height:200,borderRadius:"50%",
            background:done?`radial-gradient(circle,rgba(197,162,82,0.25),rgba(197,162,82,0.05))`:`radial-gradient(circle,${ga(0.15)},${ga(0.05)})`,
            border:`4px solid ${done?G:ga(0.25)}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            cursor:"pointer",userSelect:"none",position:"relative",overflow:"hidden",
            boxShadow:done?`0 0 40px ${ga(0.5)}`:"none",transition:"box-shadow 0.5s"}}>
            {done&&<div className="ping" style={{position:"absolute",inset:-4,borderRadius:"50%",border:`2px solid ${G}`,opacity:0.5}}/>}
            <div style={{fontSize:54,fontWeight:700,color:done?G:TX,fontFamily:"'Cinzel',serif",lineHeight:1}}>{tasbeehCount}</div>
            <div style={{fontSize:11,color:ga(0.5),marginTop:4}}>tap</div>
          </div>
          {/* Progress ring text */}
          <div style={{marginTop:12,textAlign:"center"}}>
            <div style={{fontFamily:"'Amiri',serif",fontSize:22,color:G,direction:"rtl"}}>{AR[tasbeehMode]}</div>
            <div style={{fontSize:12,color:ga(0.5),marginTop:4}}>{tasbeehCount} / {tasbeehTarget}</div>
          </div>
          {/* Progress bar */}
          <div style={{width:"100%",height:4,borderRadius:2,background:ga(0.12),overflow:"hidden",marginTop:10}}>
            <div style={{height:"100%",width:`${pct}%`,background:done?`linear-gradient(90deg,${G},${GL})`:`linear-gradient(90deg,${ga(0.5)},${G})`,borderRadius:2,transition:"width 0.3s"}}/>
          </div>
          {done&&<div style={{fontSize:12,color:G,marginTop:6}}>✨ SubhanAllah! {tasbeehCount} dhikr completed</div>}
        </div>
        {/* Controls */}
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <button onClick={()=>setTasbeehCount(0)} style={{...ghost(false),flex:1,justifyContent:"center",fontSize:12}}>Reset</button>
          <button onClick={()=>setTasbeehTarget(t=>t===33?99:t===99?100:33)} style={{...ghost(false),flex:1,justifyContent:"center",fontSize:12}}>
            Target: {tasbeehTarget}
          </button>
          <button onClick={voiceOn?stopVoice:startVoice} style={{...ghost(voiceOn),flex:1,justifyContent:"center",fontSize:12,
            borderColor:voiceOn?"rgba(78,205,196,0.5)":undefined}}>
            {voiceOn?<><Ic n="mic" z={13}/> Stop</>:<><Ic n="mic" z={13}/> Voice</>}
          </button>
        </div>
        {voiceOn&&<div style={{...card,background:"rgba(78,205,196,0.07)",border:"1px solid rgba(78,205,196,0.25)",fontSize:12,color:T,display:"flex",alignItems:"center",gap:8}}>
          <span className="spin" style={{color:T}}><Ic n="loader" z={14}/></span> Listening for "{tasbeehMode}" in Arabic…
        </div>}
        <div style={{...card,background:ga(0.04),fontSize:11,color:ga(0.5),lineHeight:1.7}}>
          Say the dhikr aloud — voice mode detects Arabic speech. Tap the circle to count manually. Vibration confirms each count.
        </div>
      </div>
    );
  };

  // ════════════ MAKKAH LIVE ════════════
  const MakkahLive=()=>{
    const STREAMS=[
      {id:"makkah",label:"Masjid Al-Haram",ar:"المسجد الحرام",url:"https://www.youtube.com/embed/XtaKXpsFPLo?autoplay=1&rel=0"},
      {id:"madinah",label:"Masjid Al-Nabawi",ar:"المسجد النبوي",url:"https://www.youtube.com/embed/l8TQMQL3yjo?autoplay=1&rel=0"},
    ];
    const src=STREAMS.find(s=>s.id===makkahSrc)||STREAMS[0];
    return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0 10px"}}>
          <div style={{fontSize:11,color:G,letterSpacing:"0.2em",textTransform:"uppercase"}}>Live · البث المباشر</div>
          <button onClick={()=>setToolTab("hub")} style={{background:"none",border:"none",color:ga(0.5),cursor:"pointer",fontSize:20}}>←</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {STREAMS.map(s=>(
            <button key={s.id} onClick={()=>setMakkahSrc(s.id)} style={{...pill(makkahSrc===s.id),flex:1,justifyContent:"center"}}>{s.label}</button>
          ))}
        </div>
        <div style={{borderRadius:13,overflow:"hidden",border:`1px solid ${ga(0.2)}`,background:ga(0.05),marginBottom:12}}>
          <div style={{position:"relative",paddingTop:"56.25%"}}>
            <iframe
              key={makkahSrc}
              src={src.url}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",border:"none"}}
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
              allowFullScreen
            />
          </div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Amiri',serif",fontSize:20,color:G}}>{src.ar}</div>
          <div style={{fontSize:11,color:ga(0.4),marginTop:4}}>Live broadcast from {src.label}</div>
        </div>
        <div style={{...card,background:ga(0.04),fontSize:11,color:ga(0.5),marginTop:12,lineHeight:1.7}}>
          Live stream requires an internet connection. If the stream doesn't load, check your connection or try the other masjid.
        </div>
      </div>
    );
  };

  // ════════════ HISNUL MUSLIM ════════════
  const HisnulMuslim=()=>{
    const activeCat=hisnulCat?HISNUL_CATS.find(c=>c.id===hisnulCat):null;
    const duas=hisnulCat?HISNUL[hisnulCat]||[]:[];
    const activeDua=hisnulDua!=null?duas[hisnulDua]:null;
    const [copied,setCopied]=React.useState(false);
    const copyDua=()=>{if(!activeDua)return;navigator.clipboard?.writeText(`${activeDua.ar}\n\n${activeDua.tr}\n\n${activeDua.en}`).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
    if(activeDua)return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 0 10px"}}>
          <button onClick={()=>setHisnulDua(null)} style={{background:"none",border:"none",color:ga(0.5),cursor:"pointer",fontSize:20}}>←</button>
          <div style={{fontSize:11,color:activeCat?.color||G,letterSpacing:"0.15em",textTransform:"uppercase"}}>{activeCat?.icon} {activeCat?.title}</div>
        </div>
        <div style={{...card,background:ga(0.04),border:`1px solid ${ga(0.2)}`}}>
          <div style={{fontFamily:"'Amiri Quran','Amiri',serif",fontSize:22,color:"#f5e8c8",direction:"rtl",textAlign:"right",lineHeight:2,marginBottom:14}}>{activeDua.ar}</div>
          {activeDua.tr&&<div style={{fontSize:12,color:ga(0.6),fontStyle:"italic",lineHeight:1.75,marginBottom:10,borderTop:`1px solid ${ga(0.1)}`,paddingTop:10}}>{activeDua.tr}</div>}
          <div style={{fontSize:12,color:TX,lineHeight:1.75,borderTop:`1px solid ${ga(0.1)}`,paddingTop:10,marginBottom:10}}>{activeDua.en}</div>
          {activeDua.src&&<div style={{fontSize:10,color:ga(0.35)}}>— {activeDua.src}</div>}
          <button onClick={copyDua} style={{...ghost(copied),fontSize:11,marginTop:10}}><Ic n={copied?"check":"copy"} z={13}/>{copied?" Copied!":" Copy Dua"}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
          {hisnulDua>0&&<button onClick={()=>setHisnulDua(d=>d-1)} style={{...ghost(false),fontSize:12}}>← Previous</button>}
          {hisnulDua<duas.length-1&&<button onClick={()=>setHisnulDua(d=>d+1)} style={{...ghost(false),fontSize:12,marginLeft:"auto"}}>Next →</button>}
        </div>
      </div>
    );
    if(activeCat)return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 0 10px"}}>
          <button onClick={()=>{setHisnulCat(null);}} style={{background:"none",border:"none",color:ga(0.5),cursor:"pointer",fontSize:20}}>←</button>
          <div>
            <div style={{fontSize:11,color:activeCat.color,letterSpacing:"0.15em",textTransform:"uppercase"}}>{activeCat.icon} {activeCat.title}</div>
            <div style={{fontFamily:"'Amiri',serif",fontSize:14,color:G}}>{activeCat.ar}</div>
          </div>
        </div>
        {duas.map((d,i)=>(
          <div key={i} onClick={()=>setHisnulDua(i)} style={{...card,cursor:"pointer",marginBottom:8}}>
            <div style={{fontFamily:"'Amiri',serif",fontSize:16,color:"#f5e8c8",direction:"rtl",textAlign:"right",lineHeight:1.8,marginBottom:6}}>{d.ar.slice(0,90)}{d.ar.length>90?"…":""}</div>
            <div style={{fontSize:11,color:ga(0.55),lineHeight:1.6}}>{d.en.slice(0,80)}{d.en.length>80?"…":""}</div>
            <div style={{fontSize:10,color:ga(0.35),marginTop:4}}>{d.src}</div>
          </div>
        ))}
      </div>
    );
    return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0 10px"}}>
          <div><div style={{fontSize:11,color:G,letterSpacing:"0.2em",textTransform:"uppercase"}}>Hisnul Muslim</div><div style={{fontSize:10,color:ga(0.45)}}>حصن المسلم · Fortress of the Muslim</div></div>
          <button onClick={()=>setToolTab("hub")} style={{background:"none",border:"none",color:ga(0.5),cursor:"pointer",fontSize:20}}>←</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {HISNUL_CATS.map(c=>(
            <div key={c.id} onClick={()=>{setHisnulCat(c.id);setHisnulDua(null);}}
              style={{...card,cursor:"pointer",textAlign:"center",padding:"16px 10px",border:`1px solid ${ga(0.15)}`,
                background:`linear-gradient(135deg,${ga(0.1)},${ga(0.05)})`}}>
              <div style={{fontSize:24,marginBottom:6}}>{c.icon}</div>
              <div style={{fontSize:12,color:c.color,fontWeight:600,marginBottom:3}}>{c.title}</div>
              <div style={{fontFamily:"'Amiri',serif",fontSize:13,color:G}}>{c.ar}</div>
              <div style={{fontSize:10,color:ga(0.4),marginTop:4}}>{(HISNUL[c.id]||[]).length} duas</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ════════════ TOOLS HUB ════════════
  const Tools=()=>{
    if(toolTab==="prayer")return<PrayerTool/>;
    if(toolTab==="qibla")return<QiblaTool/>;
    if(toolTab==="tasbeeh")return<TasbeehTool/>;
    if(toolTab==="makkah")return<MakkahLive/>;
    if(toolTab==="hisnul")return<HisnulMuslim/>;
    if(toolTab==="progress")return<Progress/>;
    if(toolTab==="settings")return<Settings/>;
    // Hub
    const nextP=prayerTimes?(()=>{
      const NAMES=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
      const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();
      const toMin=s=>{const[h,m]=s.split(":").map(Number);return h*60+m;};
      return NAMES.reduce((acc,n)=>{const pm=toMin(prayerTimes[n]);const diff=pm>nowMin?pm-nowMin:pm+1440-nowMin;return(!acc||diff<acc.diff)?{name:n,diff,time:prayerTimes[n]}:acc;},null);
    })():null;
    const toolItems=[
      {id:"prayer",icon:"🕐",label:"Prayer Times",ar:"أوقات الصلاة",sub:nextP?`Next: ${nextP.name} ${nextP.time}`:"Tap for today's times",color:G},
      {id:"qibla",icon:"🧭",label:"Qibla",ar:"القبلة",sub:qiblaDir!=null?`${qiblaDir.toFixed(1)}° from North`:"Find direction to Kaaba",color:T},
      {id:"tasbeeh",icon:"📿",label:"Tasbeeh",ar:"التسبيح",sub:`${tasbeehCount} / ${tasbeehTarget} · ${tasbeehMode}`,color:P},
      {id:"makkah",icon:"🕌",label:"Makkah Live",ar:"البث المباشر",sub:"Live Haramayn broadcast",color:"#ff7043"},
      {id:"hisnul",icon:"🛡️",label:"Hisnul Muslim",ar:"حصن المسلم",sub:"Morning, evening & daily duas",color:"#e67e22"},
    ];
    return(
      <div style={{...scr,padding:"0 16px 20px"}}>
        <div style={{padding:"13px 0 14px"}}>
          <div style={{fontSize:11,color:G,letterSpacing:"0.2em",textTransform:"uppercase"}}>Islamic Tools · الأدوات الإسلامية</div>
        </div>
        {/* Next prayer banner if available */}
        {nextP&&<div style={{...card,background:`linear-gradient(135deg,${ga(0.12)},${ga(0.06)})`,border:`1px solid ${ga(0.25)}`,
          display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,cursor:"pointer",padding:"12px 16px"}}
          onClick={()=>setToolTab("prayer")}>
          <div><div style={{fontSize:10,color:ga(0.5),textTransform:"uppercase",letterSpacing:"0.1em"}}>Next Prayer</div>
            <div style={{fontSize:18,color:G,fontFamily:"'Cinzel',serif",fontWeight:700}}>{nextP.name} · {nextP.time}</div></div>
          <Ic n="clock" z={22} c={G}/>
        </div>}
        {/* Tool grid */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {toolItems.map(t=>(
            <div key={t.id} onClick={()=>setToolTab(t.id)}
              style={{...card,cursor:"pointer",padding:"14px 12px",border:`1px solid ${ga(0.15)}`,
                background:`linear-gradient(135deg,${ga(0.09)},${ga(0.04)})`}}>
              <div style={{fontSize:26,marginBottom:6}}>{t.icon}</div>
              <div style={{fontSize:13,color:t.color,fontWeight:600,marginBottom:2}}>{t.label}</div>
              <div style={{fontFamily:"'Amiri',serif",fontSize:12,color:G,marginBottom:4}}>{t.ar}</div>
              <div style={{fontSize:10,color:ga(0.45),lineHeight:1.5}}>{t.sub}</div>
            </div>
          ))}
        </div>
        {/* Progress & Settings shortcuts */}
        <div style={{fontSize:11,color:ga(0.4),letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:8}}>More</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[
            {id:"progress",icon:"📊",label:"My Progress",color:P},
            {id:"settings",icon:"⚙️",label:"Settings",color:T},
          ].map(t=>(
            <div key={t.id} onClick={()=>setToolTab(t.id)} style={{...card,cursor:"pointer",display:"flex",alignItems:"center",gap:10,padding:"12px 14px"}}>
              <span style={{fontSize:20}}>{t.icon}</span>
              <span style={{fontSize:13,color:t.color,fontWeight:600}}>{t.label}</span>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ════════ RENDER ════════
  const views={home:<Home/>,surahs:<SurahList/>,study:<Study/>,mushaf:<Mushaf/>,arabic:<Arabic/>,tools:<Tools/>,progress:<Progress/>,settings:<Settings/>};

  return(
    <div id="app">
      {/* Header */}
      <div style={{padding:"16px 16px 11px",paddingTop:"max(16px,env(safe-area-inset-top))",borderBottom:`1px solid ${ga(0.13)}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(10,15,30,0.88)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",position:"sticky",top:0,zIndex:10,flexShrink:0}}>
        <div onClick={()=>{stopAll();setToolTab("hub");setScreen("home");}} style={{cursor:"pointer",WebkitTapHighlightColor:"transparent"}}><div style={{fontSize:12,color:G,letterSpacing:"0.18em",textTransform:"uppercase",fontFamily:"'Cinzel',serif",fontWeight:600}}>Hifz Companion</div><div style={{fontSize:9,color:ga(0.4)}}>حافظ · الحروف العربية</div></div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:10,textAlign:"right"}}><div style={{color:G}}>{streak}🔥 {totMem} ayahs</div><div style={{color:T}}>{lw.length} words · {dlProg}/114✓</div></div>
          <div style={{fontFamily:"'Amiri',serif",fontSize:20,color:G}}>حافظ</div>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {views[screen]||<Home/>}
      </div>
      {/* Bottom Nav */}
      <nav style={{display:"flex",justifyContent:"space-around",flexShrink:0,paddingTop:6,paddingBottom:"max(10px,env(safe-area-inset-bottom))",borderTop:`1px solid ${ga(0.11)}`,background:"rgba(10,15,30,0.97)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",zIndex:10}}>
        {[
          {id:"home",    l:"Home",     i:"moon"},
          {id:"surahs",  l:"Study",    i:"quran"},
          {id:"mushaf",  l:"Read",     i:"read",  c:P},
          {id:"arabic",  l:"Arabic",   i:"lesson",c:T},
          {id:"tools",    l:"Tools",    i:"tools"},
        ].map(x=>{
          const on=screen===x.id||(x.id==="surahs"&&screen==="study")||(x.id==="tools"&&(screen==="progress"||screen==="settings"));
          const col=on?(x.c||G):ga(0.38);
          return(
            <button key={x.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 8px",border:"none",background:"none",cursor:"pointer",color:col,fontSize:9,letterSpacing:"0.07em",textTransform:"uppercase"}}
              onClick={()=>{stopAll();if(x.id==="tools")setToolTab("hub");setScreen(x.id);}}>
              <Ic n={x.i} z={21}/>{x.l}
            </button>
          );
        })}
      </nav>
      {/* Settings gear (in header area would be cramped, add as long press on progress? Instead add to progress screen) */}
      <button onClick={()=>{setToolTab("settings");setScreen("tools");}} style={{position:"fixed",bottom:"max(70px,calc(env(safe-area-inset-bottom)+60px))",right:16,width:40,height:40,borderRadius:"50%",background:ga(0.15),border:`1px solid ${ga(0.3)}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:G,zIndex:9}}>
        <Ic n="cog" z={18}/>
      </button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
